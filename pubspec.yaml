name: prokat
description: "Equipment renting platform in Kazakhstan"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 0.1.5+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.3

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  geolocator: ^14.0.2

  mapbox_maps_flutter: ^2.6.0
  flutter_dotenv: ^5.2.1
  permission_handler: ^11.3.0
  riverpod: ^2.5.0

  # HTTP client
  dio: ^5.4.3

  # secure token storage
  flutter_secure_storage: ^9.0.0

  # state management
  flutter_riverpod: ^2.5.1

  # local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # json serialization
  json_annotation: ^4.9.0

  # utilities
  intl: ^0.20.2
  flutter_slidable: ^4.0.3
  cached_network_image: ^3.4.1
  geocoding: ^4.0.0
  lucide_icons: ^0.257.0
  shimmer: ^3.0.0
  flutter_chat_ui: ^2.11.1
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^2.6.1
  url_launcher: ^6.3.2
  socket_io_client: ^3.1.4
  image_picker: ^1.2.1
  image_cropper: ^12.2.1
  pinput: ^6.0.2
  mask_text_input_formatter: ^2.9.0
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

  #code generator
  build_runner: ^2.4.9

  # json generator
  json_serializable: ^6.7.1
  # hive model generator
  hive_generator: ^2.0.1
  change_app_package_name: ^1.5.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/app_icon.png
    - assets/icons/app_icon_foreground.png
    - assets/icons/app_icon_background.png
    - assets/icons/splash_branding_footer.png
    - assets/legal/privacy_policy_en.md
    - assets/legal/terms_conditions_en.md
    # - assets/legal/licenses.md

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/prokat_app_icon.png"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  adaptive_icon_background: "assets/icons/app_icon_background.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#ffffff"
  image: "assets/icons/app_icon_foreground.png"
  branding: "assets/icons/splash_branding_footer.png"

  android_12:
    color: "#ffffff"
    image: "assets/icons/app_icon_foreground.png"
    branding: "assets/icons/splash_branding_footer.png"
